<script>
(function () {
  'use strict';

  // ── NAVEGACIÓN ──────────────────────────────────────────────
  function navigateTo(moduleId) {
    document.querySelectorAll('.module').forEach(function (el) { el.classList.remove('active'); });
    var target = document.getElementById('module-' + moduleId);
    if (target) target.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(function (el) { el.classList.remove('active'); });
    var activeNav = document.querySelector('[data-module="' + moduleId + '"]');
    if (activeNav) activeNav.classList.add('active');
    document.getElementById('content').scrollTop = 0;

    // Cargar agenda si es el módulo agenda
    if (moduleId === 'agenda' && window.initAgendaModule) {
      window.initAgendaModule();
    }
  }
  window.navigateTo = navigateTo;

  // ── TABS ────────────────────────────────────────────────────
  function initTabs() {
    document.querySelectorAll('.tab-item').forEach(function (tab) {
      tab.addEventListener('click', function () {
        var tabId = this.getAttribute('data-tab');
        if (!tabId) return;
        var tabsContainer = this.closest('.tabs');
        var moduleEl      = this.closest('.module');
        tabsContainer.querySelectorAll('.tab-item').forEach(function (t) { t.classList.remove('active'); });
        this.classList.add('active');
        moduleEl.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
        var panel = document.getElementById(tabId);
        if (panel) panel.classList.add('active');
      });
    });
  }

  // ── NAV ─────────────────────────────────────────────────────
  function initNav() {
    document.querySelectorAll('.nav-item').forEach(function (item) {
      item.addEventListener('click', function () {
        var moduleId = this.getAttribute('data-module');
        if (moduleId) navigateTo(moduleId);
      });
    });
  }

  // ── FILTROS GENÉRICOS ────────────────────────────────────────
  function filterTable(input, tableSelector) {
    var query = input.value.toLowerCase().trim();
    document.querySelectorAll(tableSelector + ' tbody tr').forEach(function (row) {
      row.style.display = row.textContent.toLowerCase().indexOf(query) !== -1 ? '' : 'none';
    });
  }

  function initFilters() {
    var audFilter = document.querySelector('#me-audiencias .filter-input');
    if (audFilter) audFilter.addEventListener('input', function () { filterTable(this, '#me-audiencias'); });

    var expFilter = document.querySelector('#module-expedientes .filter-input');
    if (expFilter) expFilter.addEventListener('input', function () { filterTable(this, '#module-expedientes'); });
  }

  // ── THEME SWITCH ─────────────────────────────────────────────
  function updateThemeBtn(btn, isDark) {
    var icon  = btn.querySelector('.theme-icon');
    var label = btn.querySelector('.theme-label');
    if (icon)  icon.textContent  = isDark ? '☀️' : '🌙';
    if (label) label.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
  }

  function initThemeSwitch() {
    var btn = document.getElementById('themeSwitch');
    if (!btn) return;
    var isDark = localStorage.getItem('theme') === 'dark';
    document.body.classList.add(isDark ? 'dark' : 'light');
    updateThemeBtn(btn, isDark);
    btn.addEventListener('click', function () {
      var dark = document.body.classList.toggle('dark');
      document.body.classList.toggle('light', !dark);
      localStorage.setItem('theme', dark ? 'dark' : 'light');
      updateThemeBtn(btn, dark);
    });
  }

  // ── BADGES — Cargo counts reales desde Sheets ─────────────
  function initBadges() {
    google.script.run
      .withSuccessHandler(function(data) {
        var meBadge = document.getElementById('badge-me');
        var notifBadge = document.getElementById('badge-notif');
        if (data.error) {
          if (meBadge) meBadge.textContent = '!';
          if (notifBadge) notifBadge.textContent = '!';
          return;
        }
        if (meBadge) meBadge.textContent = data.escritos > 0 ? data.escritos : '';
        // Notificaciones = solicitudes pendientes
        if (notifBadge) notifBadge.textContent = data.solicitudes > 0 ? data.solicitudes : '';
      })
      .withFailureHandler(function(err) {
        var meBadge = document.getElementById('badge-me');
        var notifBadge = document.getElementById('badge-notif');
        if (meBadge) meBadge.textContent = '!';
        if (notifBadge) notifBadge.textContent = '!';
      })
      .getPendingCounts();
  }

  // ══════════════════════════════════════════════════════════════
  //  MESA DE ENTRADAS — LÓGICA COMPLETA
  // ══════════════════════════════════════════════════════════════

// ── Calcula tiempo del trámite desde C+D (fecha+hora) hasta Q (timestamps con espacio) o ahora
// Formato esperado: C="13/04/26", D="10:35", Q="14/04/2026 09:00" (o vacío si pendiente)
  function calcularTiempo(fecha, hora, timestamps, estado) {
    try {
      // SI Q tiene contenido (fecha+hora juntas), usarla como fin
      // SI Q está vacío, usar "ahora" como fin (para pendientes)
      var finDate;
      if (timestamps && timestamps.trim()) {
        // Q tiene formato "DD/MM/YYYY HH:MM" - split por espacio
        var partes = timestamps.trim().split(' ');
        finDate = parseFechaHora(partes[0], partes[1] || '00:00');
      } else {
        // Pendiente o sin datos: usar ahora
        finDate = new Date();
      }

      // Inicio: C (fecha) + D (hora)
      var inicio = parseFechaHora(fecha, hora);

      if (!inicio || !finDate) return { label: '—', urgente: false };

      var diff = finDate.getTime() - inicio.getTime();
      if (diff < 0) return { label: '—', urgente: false };

      var dias = Math.floor(diff / 86400000);
      var h = Math.floor((diff % 86400000) / 3600000);
      var m = Math.floor(((diff % 86400000) % 3600000) / 60000);

      var label = dias > 0 ? dias + 'd ' + h + 'h' : (h > 0 ? h + 'h ' + m + 'm' : m + 'm');
      return { label: label, urgente: dias >= 1 }; // Urgente si > 24h

    } catch (e) {
      return { label: '—', urgente: false };
    }
  }

// Helper: parsea "DD/MM/YY" o "DD/MM/YYYY" + "HH:MM" a Date
  function parseFechaHora(fecha, hora) {
    try {
      if (!fecha) return null;
      var p = fecha.split('/');
      if (p.length !== 3) return null;
      // Año: 2 dígitos ("26") → "2026"
      var anio = p[2].length === 2 ? 2000 + parseInt(p[2]) : parseInt(p[2]);
      var t = (hora || '00:00').split(':');
      return new Date(anio, parseInt(p[1]) - 1, parseInt(p[0]), parseInt(t[0]), parseInt(t[1]));
    } catch (e) { return null; }
  }

  // ── Escapa texto para evitar XSS al insertar en innerHTML
  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Renderiza las filas de escritos en la tabla
  function renderEscritos(escritos) {
    var tbody = document.getElementById('me-tbody');
    tbody.innerHTML = '';

    if (!escritos || escritos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:48px;color:var(--text-muted);">Sin registros</td></tr>';
      return;
    }

    var hoy = getHoy();

    escritos.forEach(function (e) {
      var est = (e.estado || '').trim().toLowerCase();

      // Colores inline — ningún CSS los puede pisar
      var badgeBg  = est === 'finalizado' ? '#d1fae5' : '#fef3c7';
      var badgeTxt = est === 'finalizado' ? '#065f46' : '#92400e';

      var tr = document.createElement('tr');
      tr.className = 'me-row';
      tr.dataset.id              = e.id               || '';
      tr.dataset.status          = e.estado           || '';
      tr.dataset.fecha           = e.fecha            || '';
      tr.dataset.hora            = e.hora             || '';
      tr.dataset.usuario         = e.usuario          || '';
      tr.dataset.origen          = e.origen           || '';
      tr.dataset.cuij            = e.cuij            || '';
      tr.dataset.caratula        = e.caratula         || '';
      tr.dataset.tipoSolicitante = e.tipoSolicitante  || '';
      tr.dataset.tipoSolicitud   = e.tipoSolicitud    || '';
      tr.dataset.infoAdicional  = e.infoAdicional    || '';
      tr.dataset.estadoLegajo   = e.estadoLegajo     || '';
      tr.dataset.usuarioTramite = e.usuarioTramite   || '';
      tr.dataset.tramite        = e.tramite          || '';
      tr.dataset.destino        = e.destino          || '';
      tr.dataset.via            = e.via              || '';
      tr.dataset.obs             = e.obs              || '';
      tr.dataset.timestampTramite = e.timestampTramite || '';

      tr.innerHTML =
        '<td>' + esc(e.usuario) + '</td>' +
        '<td>' + esc(e.fecha)   + '</td>' +
        '<td>' + esc(e.id)      + '</td>' +
        '<td>' + esc(e.cuij)    + '</td>' +
        '<td style="max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + esc(e.caratula) + '">' + esc(e.caratula) + '</td>' +
        '<td>' + esc(e.tipoSolicitud) + '</td>' +
        '<td><span class="badge" style="background:' + badgeBg + ';color:' + badgeTxt + ';">' + esc(e.estado) + '</span></td>' +
        '<td><button class="btn-icon me-open-btn">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</button></td>';

      tbody.appendChild(tr);
    });
  }

  // ── Actualiza los KPIs y contadores de pills
  function renderKPIs(escritos) {
    var hoy = (function() {
      var n = new Date();
      return ('0'+n.getDate()).slice(-2) + '/' + ('0'+(n.getMonth()+1)).slice(-2) + '/' + n.getFullYear();
    })();

    var total      = escritos.length;
    var pendientes = escritos.filter(function(e){ return (e.estado || '').trim().toLowerCase() === 'pendientes'; }).length;
    var finalizada = escritos.filter(function(e){ return (e.estado || '').trim().toLowerCase() === 'finalizado'; }).length;
    var deHoy      = escritos.filter(function(e){ return e.fecha  === hoy; }).length;

    var set = function(id, val) { var el = document.getElementById(id); if(el) el.textContent = val; };
    set('me-kpi-total',      total);
    set('me-kpi-hoy',        deHoy);
    set('me-kpi-pendientes', pendientes);
    set('me-kpi-finalizada', finalizada);
    set('me-count-todos',      total);
    set('me-count-pendientes', pendientes);
    set('me-count-finalizada', finalizada);
  }

  // ── Normaliza "DD/MM/YY" o "DD/MM/YYYY" a "YYYY-MM-DD" para comparar con input[type=date]
  function normalizarFecha(ddmmyy) {
    if (!ddmmyy) return '';
    var p = ddmmyy.split('/');
    if (p.length !== 3) return '';
    // Año: si es 2 dígitos ("26"), convertir a 4 ("2026")
    var anio = p[2].length === 2 ? '20' + p[2] : p[2];
    return anio + '-' + ('0' + p[1]).slice(-2) + '-' + ('0' + p[0]).slice(-2);
  }

  // ── Obtiene la fecha de hoy en formato YYYY-MM-DD
  function getHoy() {
    var n = new Date();
    return n.getFullYear() + '-' + ('0' + (n.getMonth() + 1)).slice(-2) + '-' + ('0' + n.getDate()).slice(-2);
  }

  // ── Aplica todos los filtros activos sobre las filas
  function applyMeFilters() {
    var search = (document.getElementById('me-search')      || {}).value || '';
    var desde = (document.getElementById('me-filter-desde')  || {}).value || '';
    var hasta = (document.getElementById('me-filter-hasta')|| {}).value || '';
    var status = (document.querySelector('.me-status-btn.active') || {}).getAttribute('data-filter-status') || 'todos';

    var q = search.toLowerCase().trim();

    document.querySelectorAll('#me-tabla .me-row').forEach(function (row) {
      var d = row.dataset;
      var fechaNorm = normalizarFecha(d.fecha);

      var matchStatus = status === 'todos' || (d.status || '').trim().toLowerCase() === status.toLowerCase();
      var matchFecha = true;
      if (desde && fechaNorm) matchFecha = fechaNorm >= desde;
      if (matchFecha && hasta && fechaNorm) matchFecha = fechaNorm <= hasta;
      var matchSearch = !q ||
        (d.id       || '').toLowerCase().indexOf(q) !== -1 ||
        (d.cuij     || '').toLowerCase().indexOf(q) !== -1 ||
        (d.caratula || '').toLowerCase().indexOf(q) !== -1 ||
        (d.origen   || '').toLowerCase().indexOf(q) !== -1 ||
        (d.tramite  || '').toLowerCase().indexOf(q) !== -1;

      row.style.display = (matchStatus && matchFecha && matchSearch) ? '' : 'none';
    });

    // Actualizar KPIs según lo visible
    actualizarKPIs();
  }

  // ── Actualiza los KPIs según las filas visibles (no el total)
  function actualizarKPIs() {
    var rows = document.querySelectorAll('#me-tabla .me-row');
    var visibles = [];
    rows.forEach(function(r) {
      if (r.style.display !== 'none') visibles.push(r);
    });

    var hoy = getHoy();
    var pendientes = 0;
    var finalizados = 0;
    var deHoy = 0;

    visibles.forEach(function(r) {
      var d = r.dataset;
      var est = (d.status || '').trim().toLowerCase();
      if (est === 'pendientes') pendientes++;
      if (est === 'finalizado') finalizados++;
      if (normalizarFecha(d.fecha) === hoy) deHoy++;
    });

    var set = function(id, val) { var el = document.getElementById(id); if(el) el.textContent = val; };
    set('me-kpi-total',      visibles.length);
    set('me-kpi-hoy',        deHoy);
    set('me-kpi-pendientes', pendientes);
    set('me-kpi-finalizada', finalizados);
    set('me-count-todos',      visibles.length);
    set('me-count-pendientes', pendientes);
    set('me-count-finalizada', finalizados);
  }

  // ── Status pills
  function initMeStatusFilter() {
    var statusBar = document.querySelector('.me-status-bar');
    if (!statusBar) return;
    statusBar.addEventListener('click', function (e) {
      var btn = e.target.closest('.me-status-btn');
      if (!btn) return;
      statusBar.querySelectorAll('.me-status-btn').forEach(function (b) { b.classList.remove('active'); });

  // ── Drawer: populate + open/close
  function populateDrawer(row) {
    var d = row.dataset;

    document.getElementById('me-drawer-id').textContent = d.id || '—';

    var badgeEl  = document.getElementById('me-drawer-badge');
    var estadoKey  = (d.status || '').trim().toLowerCase();
    var badgeBg    = estadoKey === 'finalizado' ? '#d1fae5' : '#fef3c7';
    var badgeTxt   = estadoKey === 'finalizado' ? '#065f46' : '#92400e';
    var badgeLabel = d.status || '—';
    badgeEl.innerHTML = '<span class="badge" style="background:' + badgeBg + ';color:' + badgeTxt + ';">' + esc(badgeLabel) + '</span>';

    var set = function(id, val) { var el = document.getElementById(id); if(el) el.textContent = val || '—'; };
    set('dd-cuij',             d.cuij);
    set('dd-origen',           d.origen);
    set('dd-caratula',         d.caratula);
    set('dd-tipo-solicitante', d.tipoSolicitante);
    set('dd-tipo-solicitud',  d.tipoSolicitud);
    set('dd-tramite',          d.tramite);
    set('dd-estado-legajo',    d.estadoLegajo || '—');
    set('dd-destino',          d.destino);
    set('dd-via',              d.via || '—');
    set('dd-usuario',          d.usuario);
    set('dd-usuario-tramite',  d.usuarioTramite);
    set('dd-timestamp-tramite', d.timestampTramite);

    // Info adicional (collapsible)
    var infoAdic = d.infoAdicional || '';
    var infoAdicEl = document.getElementById('dd-info-adicional-body');
    if (infoAdicEl) {
      infoAdicEl.textContent = infoAdic || '—';
      infoAdicEl.style.display = infoAdic ? '' : 'none';
      var toggleEl = infoAdicEl.previousElementSibling;
      if (toggleEl && toggleEl.classList.contains('me-collapsible')) {
        toggleEl.style.display = infoAdic ? '' : 'none';
      }
    }

    // Fechas: ingreso (C+D) y timestamp-tramite (T), y cálculo de tiempo
    var fechas = { ingreso: '—', resolucion: '—' };
    var tiempo = { label: '—', urgente: false };
    
    // TimestampTramite (T) tiene formato "DD/MM/YYYY HH:MM" o vacío
    var timestampsT = d.timestampTramite || '';
    
    // Ingreso: fecha (C) + hora (D)
    if (d.fecha && d.hora) {
      fechas.ingreso = d.fecha + ' ' + d.hora;
    } else if (d.fecha) {
      fechas.ingreso = d.fecha;
    }
    
    // Resolución: si T tiene contenido
    if (timestampsT.trim()) {
      fechas.resolucion = timestampsT.trim();
    }
    
    // Calcular tiempo: (C+D) inicio → (T) fin o ahora
    tiempo = calcularTiempo(d.fecha, d.hora, timestampsT, d.status);
    
    set('dd-fecha-ingreso',    fechas.ingreso);
    set('dd-fecha-resolucion', fechas.resolucion);
    set('dd-tiempo',         tiempo.label);
    
    // Color para tiempo urgente (>24h)
    var tiempoEl = document.getElementById('dd-tiempo');
    if (tiempoEl) {
      tiempoEl.style.color = tiempo.urgente ? 'var(--red)' : 'var(--text)';
    }

    var obsSection = document.getElementById('dd-obs-section');
    var obsEl      = document.getElementById('dd-obs');
    if (d.obs && d.obs.trim()) {
      obsEl.textContent        = d.obs;
      obsSection.style.display = '';
    } else {
      obsSection.style.display = 'none';
    }

  }

  // ── Carga principal: llama al Sheet via GS y renderiza todo
  function initMesaEntradas() {
    google.script.run
      .withSuccessHandler(function (data) {
        if (data.error) {
          document.getElementById('me-tbody').innerHTML =
            '<tr><td colspan="10" style="text-align:center;padding:48px;color:var(--red);">Error al cargar: ' + esc(data.error) + '</td></tr>';
          return;
        }
        renderEscritos(data.escritos);
        // Aplicar filtros + actualizar KPIs sobre lo visible (no sobre el total)
        applyMeFilters();
      })
      .withFailureHandler(function (err) {
        document.getElementById('me-tbody').innerHTML =
          '<tr><td colspan="10" style="text-align:center;padding:48px;color:var(--red);">Error de conexión: ' + esc(err.message || '') + '</td></tr>';
      })

  // ── Carga solicitudes desde Sheet
  function initSolicitudes() {
    google.script.run

          document.getElementById('me-sol-tbody').innerHTML =

  // ── Renderiza las filas de solicitudes en la tabla
  function renderSolicitudes(solicitudes) {
    var tbody = document.getElementById('me-sol-tbody');
    tbody.innerHTML = '';

    if (!solicitudes || solicitudes.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:48px;color:var(--text-muted);">Sin registros</td></tr>';
      return;
    }

    solicitudes.forEach(function (s) {
      var est = (s.estado || '').trim().toLowerCase();
      // Badge: verde=APROBADA, rojo=RECHAZADA/REVOCADA/ANULADA, amarillo=PENDIENTE
      var badgeBg  = est === 'aprobada' ? '#d1fae5' : (est === 'pendiente' ? '#fef3c7' : '#fee2e2');
      var badgeTxt = est === 'aprobada' ? '#065f46' : (est === 'pendiente' ? '#92400e' : '#991b1b');

      // Separar fecha y hora de C (formato "DD/MM/YYYY HH:MM")
      var fechaDisp = s.fechaYHora || '';
      var fechaSolo = fechaDisp;
      if (fechaDisp.indexOf(' ') !== -1) {
        fechaSolo = fechaDisp.split(' ')[0];
      }

      var tr = document.createElement('tr');
      tr.className = 'me-sol-row';
      tr.dataset.id              = s.id              || '';
      tr.dataset.usuario        = s.usuario        || '';
      tr.dataset.fecha          = fechaSolo        || '';
      tr.dataset.fechaYHora     = s.fechaYHora     || '';
      tr.dataset.cuij           = s.cuij           || '';
      tr.dataset.caratula       = s.caratula       || '';
      tr.dataset.vencimiento    = s.vencimiento    || '';
      tr.dataset.estado          = s.estado         || '';
      tr.dataset.observaciones  = s.observaciones || '';
      tr.dataset.motivoRechazo  = s.motivoRechazo  || '';
      tr.dataset.timestamp     = s.timestamp     || '';

      tr.innerHTML =
        '<td>' + esc(s.usuario) + '</td>' +
        '<td>' + esc(fechaSolo) + '</td>' +
        '<td>' + esc(s.id) + '</td>' +
        '<td>' + esc(s.cuij) + '</td>' +
        '<td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + esc(s.caratula) + '">' + esc(s.caratula) + '</td>' +
        '<td>' + esc(s.vencimiento) + '</td>' +
        '<td><span class="badge" style="background:' + badgeBg + ';color:' + badgeTxt + ';">' + esc(s.estado) + '</span></td>' +
        '<td><button class="btn-icon me-sol-open-btn">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</button></td>';

      tbody.appendChild(tr);
    });

    // Aplicar filtros
    applySolFilters();
  }

  // ── Filtros de solicitudes
  function applySolFilters() {
    var search = (document.getElementById('me-sol-search') || {}).value || '';
    var desde = (document.getElementById('me-sol-desde') || {}).value || '';
    var hasta = (document.getElementById('me-sol-hasta')|| {}).value || '';
    var status = (document.querySelector('.me-status-btn[data-sol-status].active') || {}).getAttribute('data-sol-status') || 'todos';
    var q = search.toLowerCase().trim();

    var rows = document.querySelectorAll('#me-sol-tabla .me-sol-row');
    
    // Contadores por estado
    var counts = { todos: 0, pendiente: 0, aprobada: 0, rechazada: 0, revocada: 0, anulada: 0 };

    rows.forEach(function (row) {
      var d = row.dataset;
      var est = (d.estado || '').trim().toLowerCase();  // normalizar a minúscula
      var fechaNorm = normalizarFecha(d.fecha);

      // Contar por estado
      counts.todos++;
      if (est === 'pendiente') counts.pendiente++;
      if (est === 'aprobada') counts.aprobada++;
      if (est === 'rechazada') counts.rechazada++;
      if (est === 'revocada') counts.revocada++;
      if (est === 'anulada') counts.anulada++;

      // Filtrar — status ya viene en minúscula del data attribute
      var matchStatus = status === 'todos' || est === status;
      var matchFecha = true;
      if (desde && fechaNorm) matchFecha = fechaNorm >= desde;
      if (matchFecha && hasta && fechaNorm) matchFecha = fechaNorm <= hasta;
      var matchSearch = !q ||
        (d.id       || '').toLowerCase().indexOf(q) !== -1 ||
        (d.cuij     || '').toLowerCase().indexOf(q) !== -1 ||
        (d.caratula || '').toLowerCase().indexOf(q) !== -1;

      row.style.display = (matchStatus && matchFecha && matchSearch) ? '' : 'none';
    });

    // Actualizar contadores de pills
    var setCount = function(id, val) { var el = document.getElementById(id); if(el) el.textContent = val; };
    setCount('me-sol-count-todos',    counts.todos);
    setCount('me-sol-count-pendiente', counts.pendiente);
    setCount('me-sol-count-aprobada', counts.aprobada);
    setCount('me-sol-count-rechazada', counts.rechazada);
    setCount('me-sol-count-revocada', counts.revocada);
    setCount('me-sol-count-anulada', counts.anulada);
  }

  // ── Status pills de solicitudes
  function initSolStatusFilter() {
    // Solo el status bar dentro del tab de solicitudes
    var statusBar = document.querySelector('#me-solicitudes .me-status-bar');
    if (!statusBar) return;
    statusBar.addEventListener('click', function (e) {
      var btn = e.target.closest('.me-status-btn');

      statusBar.querySelectorAll('.me-status-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      applySolFilters();
    });

  // ── Drawer Solicitudes: populate + open/close
  function populateSolDrawer(row) {
    var d = row.dataset;

    document.getElementById('me-sol-drawer-id').textContent = d.id || '—';

    // Badge
    var badgeEl = document.getElementById('me-sol-drawer-badge');
    var est = (d.estado || '').trim().toLowerCase();
    var badgeBg  = est === 'aprobada' ? '#d1fae5' : (est === 'pendiente' ? '#fef3c7' : '#fee2e2');
    var badgeTxt = est === 'aprobada' ? '#065f46' : (est === 'pendiente' ? '#92400e' : '#991b1b');
    badgeEl.innerHTML = '<span class="badge" style="background:' + badgeBg + ';color:' + badgeTxt + ';">' + esc(d.estado) + '</span>';

    var set = function(id, val) { var el = document.getElementById(id); if(el) el.textContent = val || '—'; };
    set('me-sol-dd-cuij',        d.cuij);
    set('me-sol-dd-caratula',    d.caratula);
    set('me-sol-dd-usuario',    d.usuario);
    set('me-sol-dd-fecha-ingreso', d.fechaYHora);
    set('me-sol-dd-vencimiento', d.vencimiento);
    
    // Resaltar vencimiento si está cerca o vencido
    var vctEl = document.getElementById('me-sol-dd-vencimiento');
    if (vctEl && d.vencimiento) {
      var vctNorm = normalizarFecha(d.vencimiento);
      var hoy = getHoy();
      var diasRest = Math.floor((new Date(vctNorm) - new Date(hoy)) / (1000 * 60 * 60 * 24));
      if (diasRest < 0) {
        vctEl.style.color = 'var(--red)';
        vctEl.style.fontWeight = '600';
      } else if (diasRest <= 3) {
        vctEl.style.color = '#d97706'; // naranja/amarillo oscuro
        vctEl.style.fontWeight = '600';
      } else {
        vctEl.style.color = 'var(--text)';
        vctEl.style.fontWeight = '400';
      }
    }

    // Observaciones
    var obsSec = document.getElementById('me-sol-dd-obs-section');
    var obsEl = document.getElementById('me-sol-dd-obs');
    if (d.observaciones && d.observaciones.trim()) {
      obsEl.textContent = d.observaciones;
      obsSec.style.display = '';
    } else {
      obsSec.style.display = 'none';
    }

    // Motivo Rechazo
    var rechSec = document.getElementById('me-sol-dd-rechazo-section');
    var rechEl = document.getElementById('me-sol-dd-rechazo');
    if (d.motivoRechazo && d.motivoRechazo.trim()) {
      rechEl.textContent = d.motivoRechazo;
      rechSec.style.display = '';
    } else {
      rechSec.style.display = 'none';
    }

    // Timeline (desde columna J)
    var tlEl = document.getElementById('me-sol-dd-timeline');
    tlEl.innerHTML = '';
    if (d.timestamp && d.timestamp.trim()) {
      tlEl.innerHTML = '<span style="font-size:12px;color:var(--text);">' + esc(d.timestamp) + '</span>';
    } else {
      tlEl.innerHTML = '<span style="font-size:12px;color:var(--text-muted);">Sin eventos</span>';
    }
  }

  // ── Renderiza tabla Pre (sin drawer, sin estado, sin vencimiento)
  function renderAgendaPreTable(tbodyId, countId, items) {
    var tbody  = document.getElementById(tbodyId);
    var countEl = document.getElementById(countId);
    if (!tbody) return;

    if (!items || items.length === 0) {
      if (countEl) countEl.textContent = '0';
      tbody.innerHTML = '<tr><td colspan="4" class="agenda-empty">Sin registros</td></tr>';
      return;
    }

    if (countEl) countEl.textContent = items.length;
    tbody.innerHTML = items.map(function(item) {
      var fn = normalizarFecha(item.fecha || '');
      return (
        '<tr class="agenda-pre-row"' +
          ' data-id="'         + esc(item.id       || '') + '"' +
          ' data-fecha="'      + esc(item.fecha     || '') + '"' +
          ' data-fecha-norm="' + esc(fn)                   + '"' +
          ' data-cuij="'       + esc(item.cuij      || '') + '"' +
          ' data-caratula="'   + esc(item.caratula  || '') + '"' +
          ' data-estado="'     + esc(item.estado    || '') + '"' +
        '>' +
          '<td class="id-cell">' + esc(item.id) + '</td>' +
          '<td><span class="agenda-fecha">' + esc(item.fecha) + '</span><span class="agenda-hora">' + esc(item.hora) + '</span></td>' +
          '<td class="agenda-cuij-cell">' + esc(item.cuij) + '</td>' +
          '<td class="text-cell title-cell" title="' + esc(item.caratula) + '">' + esc(item.caratula) + '</td>' +
        '</tr>'
      );
    }).join('');
  }

  // ── Renderiza tabla Agendamiento (9 cols — fila muestra fecha de INGRESO)
  function renderAgendaAgTable(tbodyId, countId, items, tipo) {
    var tbody   = document.getElementById(tbodyId);
    var countEl = document.getElementById(countId);
    if (!tbody) return;

    if (!items || items.length === 0) {
      if (countEl) countEl.textContent = '0';
      tbody.innerHTML = '<tr><td colspan="9" class="agenda-empty">Sin registros</td></tr>';
      return;
    }

    if (countEl) countEl.textContent = items.length;
    tbody.innerHTML = items.map(function(item) {
      var agendada   = item.agendada   === true;
      var cancelada  = item.cancelada  === true;
      var reSorteada = item.reSorteada === true;
      var fn         = normalizarFecha(item.fechaIngreso || '');

      // Estado derivado
      var estadoLabel;
      if      (cancelada)  estadoLabel = 'Cancelada';
      else if (reSorteada) estadoLabel = 'Re sorteada';
      else if (agendada)   estadoLabel = 'Agendada';
      else                 estadoLabel = 'Pendiente';

      // ID con asterisco si fue re sorteada
      var idHtml = esc(item.id || '');
      if (reSorteada) idHtml += '<span class="agenda-asterisco" title="Re sorteada">*</span>';

      // Zoom
      var zoomHtml = item.linkZoom
        ? '<a class="agenda-zoom-link" href="' + esc(item.linkZoom) + '" target="_blank" rel="noopener" title="Abrir Zoom" onclick="event.stopPropagation()">↗</a>'
        : '<span class="agenda-chk-off">—</span>';

      // Checkboxes visuales
      var chk = function(v) {
        return v ? '<span class="agenda-chk-on">✓</span>' : '<span class="agenda-chk-off">—</span>';
      };

      var rowClass = 'agenda-ag-row' +
        (agendada  ? ' agenda-ag-clickable' : '') +
        (cancelada ? ' agenda-ag-cancelada' : '');

      return (
        '<tr class="' + rowClass + '"' +
          ' data-id="'              + esc(item.id                  || '') + '"' +
          ' data-fecha-ingreso="'   + esc(item.fechaIngreso         || '') + '"' +
          ' data-hora-ingreso="'    + esc(item.horaIngreso          || '') + '"' +
          ' data-fecha-norm="'      + esc(fn)                              + '"' +
          ' data-fecha="'           + esc(item.fecha                || '') + '"' +
          ' data-hora="'            + esc(item.hora                 || '') + '"' +
          ' data-fecha-accion="'    + esc(item.fechaAccion          || '') + '"' +
          ' data-hora-accion="'     + esc(item.horaAccion           || '') + '"' +
          ' data-cuij="'            + esc(item.cuij                 || '') + '"' +
          ' data-caratula="'        + esc(item.caratula             || '') + '"' +
          ' data-tipo="'            + esc(tipo || item.tipo         || '') + '"' +
          ' data-tipo-aud="'        + esc(item.tipoAudiencia        || '') + '"' +
          ' data-juez="'            + esc(item.juez                 || '') + '"' +
          ' data-fiscal="'          + esc(item.fiscal               || '') + '"' +
          ' data-defensa="'         + esc(item.defensa              || '') + '"' +
          ' data-querella="'        + esc(item.querella             || '') + '"' +
          ' data-ei="'              + (item.equipoInterdisciplinario ? 'true' : 'false') + '"' +
          ' data-sala="'            + esc(item.sala                 || '') + '"' +
          ' data-zoom="'            + esc(item.linkZoom             || '') + '"' +
          ' data-agendada="'        + (agendada   ? 'true' : 'false')      + '"' +
          ' data-cancelada="'       + (cancelada  ? 'true' : 'false')      + '"' +
          ' data-re-sorteada="'     + (reSorteada ? 'true' : 'false')      + '"' +
          ' data-motivo-can="'      + esc(item.motivoCancelacion    || '') + '"' +
          ' data-usuario-can="'     + esc(item.usuarioCancelacion   || '') + '"' +
          ' data-motivo-res="'      + esc(item.motivoReSorteo       || '') + '"' +
          ' data-usuario-res="'     + esc(item.usuarioReSorteo      || '') + '"' +
          ' data-estado="'          + esc(estadoLabel)                     + '"' +
        '>' +
          '<td class="id-cell">' + idHtml + '</td>' +
          '<td><span class="agenda-fecha">' + esc(item.fechaIngreso || '—') + '</span><span class="agenda-hora">' + esc(item.horaIngreso || '') + '</span></td>' +
          '<td class="agenda-cuij-cell">' + esc(item.cuij || '—') + '</td>' +
          '<td class="text-cell title-cell" title="' + esc(item.caratula) + '">' + esc(item.caratula) + '</td>' +
          '<td>' + esc(item.tipoAudiencia || '—') + '</td>' +
          '<td class="agenda-icon-cell">' + zoomHtml + '</td>' +
          '<td class="agenda-icon-cell">' + chk(agendada)   + '</td>' +
          '<td class="agenda-icon-cell">' + chk(cancelada)  + '</td>' +
          '<td class="agenda-icon-cell">' + chk(reSorteada) + '</td>' +
        '</tr>'
      );
    }).join('');
  }

  // ── Construye pills dinámicas a partir de los ítems de una sección
  function buildAgendaPills(pillsId, items, applyFn) {
    var container = document.getElementById(pillsId);
    if (!container) return;

    // Conteos por estado
    var states = {};
    (items || []).forEach(function(item) {
      var s = (item.estado || '').trim();
      if (s) states[s] = (states[s] || 0) + 1;
    });

    var total = (items || []).length;
    var html  = '<button class="agenda-pill active" data-agenda-status="todos">' +
                  'Todos <span class="agenda-pill-count">' + total + '</span>' +
                '</button>';

    Object.keys(states).sort().forEach(function(s) {
      html += '<button class="agenda-pill" data-agenda-status="' + esc(s.toLowerCase()) + '">' +
                esc(s) + ' <span class="agenda-pill-count">' + states[s] + '</span>' +
              '</button>';
    });

    container.innerHTML = html;

    // Un solo listener por contenedor (reemplaza el anterior junto con el innerHTML)
    container.addEventListener('click', function(e) {
      var pill = e.target.closest('.agenda-pill');
      if (!pill) return;
      container.querySelectorAll('.agenda-pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      applyFn();
    });
  }

  // ── Aplica filtros de Pre-agendamiento — función genérica por tabla
  function applyAgendaPreTableFilters(tbodyId, searchId, desdeId, hastaId, pillsId) {
    var search = (document.getElementById(searchId) || {}).value || '';
    var desde  = (document.getElementById(desdeId)  || {}).value || '';
    var hasta  = (document.getElementById(hastaId)  || {}).value || '';
    var pill   = document.querySelector('#' + pillsId + ' .agenda-pill.active');
    var status = pill ? pill.getAttribute('data-agenda-status') : 'todos';
    var q      = search.toLowerCase().trim();

    var tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    tbody.querySelectorAll('.agenda-pre-row').forEach(function(row) {
      var d          = row.dataset;
      var fn         = d.fechaNorm || '';
      var matchSearch = !q ||
        (d.id       || '').toLowerCase().indexOf(q) !== -1 ||
        (d.cuij     || '').toLowerCase().indexOf(q) !== -1 ||
        (d.caratula || '').toLowerCase().indexOf(q) !== -1;
      var matchStatus = status === 'todos' || (d.estado || '').trim().toLowerCase() === status;
      var matchFecha  = true;
      if (desde && fn) matchFecha = fn >= desde;
      if (matchFecha && hasta && fn) matchFecha = fn <= hasta;
      row.style.display = (matchSearch && matchStatus && matchFecha) ? '' : 'none';
    });
  }

  // ── Drawer: populate
  function populateAgendaDrawer(row) {
    var d         = row.dataset;
    var tipo      = d.tipo || '';
    var tipoBg    = tipo === 'escrito'  ? '#fef3c7' : '#dbeafe';
    var tipoTxt   = tipo === 'escrito'  ? '#92400e' : '#1e40af';
    var tipoLabel = tipo === 'escrito'  ? 'Escrito'  : 'Solicitud';

    document.getElementById('agenda-drawer-id').textContent = d.id || '—';
    document.getElementById('agenda-drawer-tipo-badge').innerHTML =
      '<span class="badge" style="background:' + tipoBg + ';color:' + tipoTxt + ';">' + tipoLabel + '</span>';

    var set = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val || '—'; };

    // Identificación
    set('agenda-dd-cuij',     d.cuij);
    set('agenda-dd-caratula', d.caratula);

    // Audiencia
    set('agenda-dd-tipo-aud', d.tipoAud);
    set('agenda-dd-sala',     d.sala);
    set('agenda-dd-fecha',    d.fecha   ? (d.fecha + (d.hora ? '  ·  ' + d.hora : '')) : '—');

    var zoomEl = document.getElementById('agenda-dd-zoom');
    if (zoomEl) {
      if (d.zoom) {
        zoomEl.innerHTML = '<a href="' + esc(d.zoom) + '" target="_blank" rel="noopener" class="agenda-zoom-link-drawer">Abrir reunión ↗</a>';
      } else {
        zoomEl.textContent = '—';
      }
    }

    // Integrantes
    set('agenda-dd-juez',     d.juez);
    set('agenda-dd-fiscal',   d.fiscal);
    set('agenda-dd-defensa',  d.defensa);
    set('agenda-dd-querella', d.querella);
    var eiSection = document.getElementById('agenda-dd-ei-section');
    if (eiSection) eiSection.style.display = (d.ei === 'true') ? '' : 'none';

    // Estado badge
    var cancelada  = d.cancelada   === 'true';
    var reSorteada = d.reSorteada  === 'true';
    var agendada   = d.agendada    === 'true';
    var estadoLabel, estadoBg, estadoTxt;
    if      (cancelada)  { estadoLabel = 'Cancelada';   estadoBg = '#fee2e2'; estadoTxt = '#991b1b'; }
    else if (reSorteada) { estadoLabel = 'Re sorteada'; estadoBg = '#fef3c7'; estadoTxt = '#92400e'; }
    else if (agendada)   { estadoLabel = 'Agendada';    estadoBg = '#d1fae5'; estadoTxt = '#065f46'; }
    else                 { estadoLabel = 'Pendiente';   estadoBg = '#f1f5f9'; estadoTxt = '#64748b'; }
    var estadoEl = document.getElementById('agenda-dd-estado-badge');
    if (estadoEl) estadoEl.innerHTML = '<span class="badge" style="background:' + estadoBg + ';color:' + estadoTxt + ';">' + estadoLabel + '</span>';

    // Cancelación (condicional)
    var canSection = document.getElementById('agenda-dd-cancelacion-section');
    if (canSection) {
      canSection.style.display = cancelada ? '' : 'none';
      if (cancelada) {
        set('agenda-dd-motivo-can',  d.motivoCan);
        set('agenda-dd-usuario-can', d.usuarioCan);
      }
    }

    // Re sorteo (condicional)
    var resSection = document.getElementById('agenda-dd-resorteo-section');
    if (resSection) {
      resSection.style.display = reSorteada ? '' : 'none';
      if (reSorteada) {
        set('agenda-dd-motivo-res',  d.motivoRes);
        set('agenda-dd-usuario-res', d.usuarioRes);
      }
    }
  }

  function initAgendaDrawer() {
    ['agenda-list-ag-escritos', 'agenda-list-ag-solicitudes'].forEach(function(id) {
      var tbody = document.getElementById(id);
      if (!tbody) return;
      tbody.addEventListener('click', function(e) {
        // No abrir drawer si el click fue en el link de zoom
        if (e.target.closest('.agenda-zoom-link')) return;
        var row = e.target.closest('.agenda-ag-clickable');
        if (row) openAgendaDrawer(row);
      });
    });
    var closeBtn = document.getElementById('agenda-drawer-close');
    if (closeBtn) closeBtn.addEventListener('click', closeAgendaDrawer);
    var overlay = document.getElementById('agenda-overlay');
    if (overlay) overlay.addEventListener('click', closeAgendaDrawer);
  }

      var h = getHoy();
      if (agEscDesde) agEscDesde.value = h;
      if (agEscHasta) agEscHasta.value = h;
      applyAgendaAgEscFilters();
    });
  }

  // ── Tab switcher
  function initAgendaTabs() {
    var tabs = document.querySelectorAll('.agenda-tab[data-agenda-tab]');
    tabs.forEach(function(tab) {
      tab.addEventListener('click', function() {
        var target = tab.getAttribute('data-agenda-tab');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        document.querySelectorAll('.agenda-tab-panel').forEach(function(panel) {
          panel.style.display = (panel.id === 'agenda-panel-' + target) ? '' : 'none';
        });
      });
    });
  }

  // ── Carga de datos — MOCK (para testing drawer)
  function initAgendaData() {
    ['agenda-list-pre-escritos', 'agenda-list-pre-solicitudes'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = '<tr><td colspan="4" class="agenda-loading">Cargando...</td></tr>';
    });
    ['agenda-list-ag-escritos', 'agenda-list-ag-solicitudes'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.innerHTML = '<tr><td colspan="9" class="agenda-loading">Cargando...</td></tr>';
    });

    // Simular delay de red
    setTimeout(function() {
      var data = _agendaMockData;

      renderAgendaPreTable('agenda-list-pre-escritos',    'agenda-count-pre-escritos',    data.preEscritos);
      renderAgendaPreTable('agenda-list-pre-solicitudes', 'agenda-count-pre-solicitudes', data.preSolicitudes);
      renderAgendaAgTable( 'agenda-list-ag-escritos',     'agenda-count-ag-escritos',     data.agEscritos,    'escrito');
      renderAgendaAgTable( 'agenda-list-ag-solicitudes',  'agenda-count-ag-solicitudes',  data.agSolicitudes, 'solicitud');

      // Pills dinámicas Pre
      buildAgendaPills('agenda-pre-sol-pills', data.preSolicitudes || [], applyAgendaPreSolFilters);
      buildAgendaPills('agenda-pre-esc-pills', data.preEscritos    || [], applyAgendaPreEscFilters);

      // Pills dinámicas Ag
      buildAgendaPills('agenda-ag-sol-pills', data.agSolicitudes || [], applyAgendaAgSolFilters);
      buildAgendaPills('agenda-ag-esc-pills', data.agEscritos    || [], applyAgendaAgEscFilters);

      // Aplicar filtros iniciales (respeta rango de fecha ya seteado)
      applyAgendaPreFilters();
      applyAgendaAgFilters();
    }, 500);
  }

  // Punto de entrada — llamado desde navigateTo('agenda')
  window.initAgendaModule = function() {
    if (!_agendaInitialized) {
      _agendaInitialized = true;
      initAgendaTabs();
      initAgendaFilters();
      initAgendaDrawer();
    }
    initAgendaData();
  };
})();
</script>
</body>
</html>
