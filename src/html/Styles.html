<style>
/* =====================================================
   UNIFICACIÓN — Portal Jurídico OGJ
   Aesthetic: Modern Legal SaaS
   Fonts: Inter + Playfair Display + Fira Code
   ===================================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=Fira+Code:wght@400;500&display=swap');

/* ══════════════════════════════════════════════════════
   TOKENS GLOBALES
   ══════════════════════════════════════════════════════ */
:root {
  --sidebar-width:     210px;
  --accent:            #c9973a;
  --accent-light:      #e8b96a;
  --accent-muted:      rgba(201, 151, 58, 0.12);
  --accent-hover:      rgba(201, 151, 58, 0.18);

  /* Sidebar — CLARO */
  --sidebar-bg:        #f8fafc;
  --sidebar-border:    #e2e8f0;
  --logo-color:        #0f172a;
  --nav-text:          #64748b;
  --nav-text-hover:    #0f172a;
  --nav-active-text:   #c9973a;
  --nav-hover-bg:      #f1f5f9;
  --section-label:     #94a3b8;

  /* Content — CLARO */
  --content-bg:        #f1f5f9;
  --card-bg:           #ffffff;
  --card-bg-alt:       #f8fafc;
  --card-border:       #e2e8f0;
  --card-shadow:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.08);

  --text-primary:      #0f172a;
  --text-secondary:    #475569;
  --text-muted:        #94a3b8;

  /* Tablas */
  --table-head-bg:     #f8fafc;
  --table-row-even:    #f8fafc;
  --table-row-odd:     #ffffff;
  --table-row-hover:   #f1f5f9;
  --table-border:      #e2e8f0;

  /* Inputs / Filtros */
  --filter-bg:         #f8fafc;
  --input-bg:          #ffffff;
  --module-header-bg:  #ffffff;

  --green:   #10b981;
  --red:     #ef4444;
  --yellow:  #f59e0b;
  --blue:    #3b82f6;
  --purple:  #8b5cf6;

  --radius:    8px;
  --radius-lg: 14px;
  --transition: all 0.2s ease;
}

/* ══════════════════════════════════════════════════════
   TEMA CLARO (explícito — mismos valores que :root)
   ══════════════════════════════════════════════════════ */
body.light {
  --sidebar-bg:        #f8fafc;
  --sidebar-border:    #e2e8f0;
  --logo-color:        #0f172a;
  --nav-text:          #64748b;
  --nav-text-hover:    #0f172a;
  --nav-active-text:   #c9973a;
  --nav-hover-bg:      #f1f5f9;
  --section-label:     #94a3b8;

  --content-bg:        #f1f5f9;
  --card-bg:           #ffffff;
  --card-bg-alt:       #f8fafc;
  --card-border:       #e2e8f0;
  --card-shadow:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.08);

  --text-primary:      #0f172a;
  --text-secondary:    #475569;
  --text-muted:        #94a3b8;

  --table-head-bg:     #f8fafc;
  --table-row-even:    #f8fafc;
  --table-row-odd:     #ffffff;
  --table-row-hover:   #f1f5f9;
  --table-border:      #e2e8f0;

  --filter-bg:         #f8fafc;
  --input-bg:          #ffffff;
  --module-header-bg:  #ffffff;
}

/* ══════════════════════════════════════════════════════
   TEMA OSCURO
   ══════════════════════════════════════════════════════ */
body.dark {
  --sidebar-bg:        #0b0f18;
  --sidebar-border:    #1a2235;
  --logo-color:        #ffffff;
  --nav-text:          #7a8696;
  --nav-text-hover:    #c0cad6;
  --nav-active-text:   #e8b96a;
  --nav-hover-bg:      rgba(255,255,255,0.05);
  --section-label:     #374253;

  --content-bg:        #0f1520;
  --card-bg:           #161e2e;
  --card-bg-alt:       #1a2438;
  --card-border:       #243044;
  --card-shadow:       0 1px 3px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.25);
  --card-shadow-hover: 0 4px 20px rgba(0,0,0,0.5);

  --text-primary:      #dde6f0;
  --text-secondary:    #8ea3b8;
  --text-muted:        #5a7090;

  --table-head-bg:     #111827;
  --table-row-even:    #161e2e;
  --table-row-odd:     #1a2438;
  --table-row-hover:   #1f2d44;
  --table-border:      #243044;

  --filter-bg:         #111827;
  --input-bg:          #1a2438;
  --module-header-bg:  #111827;
}

/* ══════════════════════════════════════════════════════
   RESET
   ══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--content-bg);
  display: flex;
  overflow: hidden;
  transition: background 0.25s ease, color 0.25s ease;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ══════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════ */
#app {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ══════════════════════════════════════════════════════
   SIDEBAR
   ══════════════════════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--sidebar-border) transparent;
  transition: width 0.22s ease, min-width 0.22s ease;
  flex-shrink: 0;
}

#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--sidebar-border); border-radius: 4px; }

/* ── Header / Brand ── */
.sidebar-header {
  padding: 16px 14px 14px;
  border-bottom: 1px solid var(--sidebar-border);
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  overflow: hidden;
}

.sidebar-monogram {
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 2px 8px rgba(201,151,58,0.35);
}

.sidebar-brand-text {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-brand-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--logo-color);
  letter-spacing: -0.02em;
  white-space: nowrap;
  line-height: 1.2;
}

.sidebar-brand-sub {
  font-size: 10px;
  font-weight: 400;
  color: var(--section-label);
  letter-spacing: 0.03em;
  white-space: nowrap;
  margin-top: 2px;
}

/* ── Nav ── */
.sidebar-nav {
  flex: 1;
  padding: 6px 0 12px;
  overflow-x: hidden;
}

.nav-section { margin-bottom: 0; }

.nav-section-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--section-label);
  padding: 18px 16px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  overflow: hidden;
}

.nav-section-label::after {
  content: '';
  display: block;
  height: 1px;
  background: var(--sidebar-border);
  flex: 1;
  opacity: 0.6;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 10px;
  margin: 1px 8px;
  cursor: pointer;
  color: var(--nav-text);
  font-size: 12.5px;
  font-weight: 400;
  border-radius: 8px;
  transition: var(--transition);
  user-select: none;
  position: relative;
  white-space: nowrap;
  overflow: hidden;
  border: 1px solid transparent;
}

.nav-item:hover {
  color: var(--nav-text-hover);
  background: var(--nav-hover-bg);
  border-color: var(--sidebar-border);
}

.nav-item.active {
  color: var(--nav-active-text);
  background: var(--accent-muted);
  border-color: rgba(201,151,58,0.25);
  font-weight: 500;
}

.nav-item.active:hover {
  background: var(--accent-hover);
}

.nav-item .icon {
  width: 28px;
  min-width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-radius: 7px;
  background: transparent;
  transition: background 0.15s ease, opacity 0.15s ease;
  opacity: 0.5;
}

.nav-item:hover .icon {
  opacity: 0.85;
  background: var(--sidebar-border);
}

.nav-item.active .icon {
  opacity: 1;
  background: rgba(201,151,58,0.2);
}

.nav-label { overflow: hidden; flex: 1; }

.nav-badge {
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
  flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(201,151,58,0.4);
}

/* ── Footer ── */
.sidebar-footer {
  padding: 12px 14px 14px;
  border-top: 1px solid var(--sidebar-border);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sidebar-footer-date {
  font-size: 10px;
  color: var(--section-label);
  font-weight: 500;
  letter-spacing: 0.03em;
  padding: 0 2px;
}

/* ══════════════════════════════════════════════════════
   DASHBOARD — suelto arriba
   ══════════════════════════════════════════════════════ */
.nav-section-top {
  padding-top: 4px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--sidebar-border);
  margin-bottom: 4px;
}

/* ══════════════════════════════════════════════════════
   THEME SWITCH
   ══════════════════════════════════════════════════════ */
.theme-switch {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--sidebar-border);
  background: var(--nav-hover-bg);
  cursor: pointer;
  font-size: 11.5px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  color: var(--nav-text);
  transition: var(--transition);
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  width: 100%;
}
.theme-switch:hover {
  background: var(--nav-hover-bg);
  color: var(--nav-text-hover);
  border-color: var(--accent);
}
.theme-switch .theme-icon { font-size: 13px; flex-shrink: 0; }
.theme-switch .theme-label { overflow: hidden; }

/* ══════════════════════════════════════════════════════
   CONTENT AREA
   ══════════════════════════════════════════════════════ */
#content {
  flex: 1;
  height: 100vh;
  overflow-y: auto;
  background: var(--content-bg);
  position: relative;
  transition: background 0.25s ease;
}

#content::-webkit-scrollbar { width: 5px; }
#content::-webkit-scrollbar-thumb {
  background: var(--card-border);
  border-radius: 10px;
}

/* ══════════════════════════════════════════════════════
   MÓDULOS
   ══════════════════════════════════════════════════════ */
.module { display: none; position: relative; z-index: 1; }
.module.active { display: block; }

.module-header {
  background: var(--module-header-bg);
  border-bottom: 1px solid var(--card-border);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  transition: background 0.25s ease;
}

.module-title {
  font-family: 'Inter', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.module-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
  font-weight: 400;
}

.module-actions { display: flex; gap: 8px; align-items: center; }
.module-body { padding: 22px 24px; }

/* ══════════════════════════════════════════════════════
   CARDS
   ══════════════════════════════════════════════════════ */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
  overflow: hidden;
  transition: box-shadow 0.2s ease, transform 0.2s ease, background 0.25s ease;
}

.card:hover {
  box-shadow: var(--card-shadow-hover);
}

.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card-bg-alt);
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

.card-body { padding: 18px 20px; }

/* ══════════════════════════════════════════════════════
   KPI GRID
   ══════════════════════════════════════════════════════ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 22px;
}

.kpi-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  box-shadow: var(--card-shadow);
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.2s ease, transform 0.2s ease, background 0.25s ease;
}

.kpi-card:hover {
  box-shadow: var(--card-shadow-hover);
  transform: translateY(-1px);
}

.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.kpi-card.amber::after  { background: var(--accent); }
.kpi-card.green::after  { background: var(--green); }
.kpi-card.blue::after   { background: var(--blue); }
.kpi-card.purple::after { background: var(--purple); }
.kpi-card.red::after    { background: var(--red); }

.kpi-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.kpi-value {
  font-family: 'Inter', sans-serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
  letter-spacing: -0.03em;
}

.kpi-meta { font-size: 11px; color: var(--text-muted); margin-top: 7px; }

/* ══════════════════════════════════════════════════════
   TABLAS
   ══════════════════════════════════════════════════════ */
.table-wrapper {
  overflow-x: auto;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  background: var(--table-head-bg);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--table-border);
  transition: background 0.25s ease;
  white-space: nowrap;
}

tbody tr:nth-child(even) td { background: var(--table-row-even); }
tbody tr:nth-child(odd)  td { background: var(--table-row-odd); }

tbody td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--table-border);
  color: var(--text-primary);
  vertical-align: middle;
  transition: background 0.12s ease;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--table-row-hover) !important; }

.id-cell {
  font-family: 'Fira Code', monospace;
  font-size: 11.5px;
  color: var(--accent);
  font-weight: 500;
}

/* ══════════════════════════════════════════════════════
   BADGES
   ══════════════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.badge::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

.badge-pendiente  { background: #fef3c7; color: #92400e; }
.badge-asignado   { background: #dbeafe; color: #1e40af; }
.badge-resuelto   { background: #d1fae5; color: #065f46; }
.badge-confirmada { background: #d1fae5; color: #065f46; }
.badge-activo     { background: #d1fae5; color: #065f46; }
.badge-aprobada   { background: #d1fae5; color: #065f46; }
.badge-urgente    { background: #fee2e2; color: #991b1b; }
.badge-aviso      { background: #fef3c7; color: #92400e; }
.badge-info       { background: #dbeafe; color: #1e40af; }
.badge-sistema    { background: #ede9fe; color: #5b21b6; }
.badge-leida      { background: var(--table-head-bg); color: var(--text-muted); }

body.dark .badge-pendiente  { background: #3d2a00; color: #fbbf24; }
body.dark .badge-asignado   { background: #1e3a5f; color: #60a5fa; }
body.dark .badge-resuelto,
body.dark .badge-confirmada,
body.dark .badge-activo,
body.dark .badge-aprobada   { background: #052e16; color: #34d399; }
body.dark .badge-urgente    { background: #450a0a; color: #f87171; }
body.dark .badge-aviso      { background: #3d2a00; color: #fbbf24; }
body.dark .badge-info       { background: #1e3a5f; color: #60a5fa; }
body.dark .badge-sistema    { background: #2e1065; color: #a78bfa; }

/* ══════════════════════════════════════════════════════
   BOTONES
   ══════════════════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.01em;
}

.btn:active { transform: scale(0.97); }

.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-light); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--card-border);
}
.btn-ghost:hover {
  background: var(--table-row-hover);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.btn-icon {
  width: 32px; height: 32px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius);
  background: transparent;
  border: 1px solid var(--card-border);
  cursor: pointer;
  color: var(--text-muted);
  transition: var(--transition);
}
.btn-icon:hover {
  background: var(--table-row-hover);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

/* ══════════════════════════════════════════════════════
   TABS
   ══════════════════════════════════════════════════════ */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--card-border);
  padding: 0 20px;
  background: var(--module-header-bg);
  transition: background 0.25s ease;
}

.tab-item {
  padding: 11px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  margin-bottom: -1px;
  user-select: none;
  letter-spacing: -0.01em;
}

.tab-item:hover { color: var(--text-secondary); }
.tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ══════════════════════════════════════════════════════
   FILTROS
   ══════════════════════════════════════════════════════ */
.filters-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid var(--card-border);
  background: var(--filter-bg);
  flex-wrap: wrap;
  transition: background 0.25s ease;
}

.filter-input,
.filter-select {
  padding: 7px 12px;
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  color: var(--text-primary);
  background: var(--input-bg);
  outline: none;
  transition: var(--transition);
}

.filter-input:focus,
.filter-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-muted);
}

.filter-input::placeholder { color: var(--text-muted); }

.filter-select {
